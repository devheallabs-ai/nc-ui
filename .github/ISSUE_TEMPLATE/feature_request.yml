name: Feature Request
description: Suggest a new feature or improvement for NC
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Help us understand what you need.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's frustrating or missing?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work? Show example NC code if possible.
      placeholder: |
        ```
        ask AI to "do something new" using data
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the NC ecosystem does this relate to?
      options:
        - NC Language (core engine)
        - NC UI (frontend framework)
        - NC AI (AI/ML features)
        - CLI / Developer Experience
        - Documentation
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or references.
