name: Bug Report
description: Report a bug in NC
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Run `nc ...`
        2. Type `...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens. Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: NC Code (if applicable)
      description: Minimal NC code snippet to reproduce.
      render: text

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows 11
        - Windows 10
        - Ubuntu 24.04
        - Ubuntu 22.04
        - Other Linux
        - Docker
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: NC Version
      description: "Output of `nc version`"
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: dropdown
    id: ai-provider
    attributes:
      label: AI Provider (if relevant)
      options:
        - None / not using AI features
        - Built-in (NC AI)
        - OpenAI
        - Ollama
        - Other
