<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NC UI Playground — Build websites in plain English</title>
  <meta name="description" content="Try NC UI live in your browser. Write plain English, get stunning websites.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --bg-card: #12121a;
      --bg-editor: #0d0d14;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f5;
      --text-dim: rgba(255,255,255,0.5);
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --gradient: linear-gradient(135deg, #00d4ff, #7c3aed);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ─── Header ─────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      flex-shrink: 0;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-weight: 800;
      font-size: 1.1rem;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo span {
      -webkit-text-fill-color: var(--text-dim);
      font-weight: 400;
      font-size: 0.85rem;
      margin-left: 8px;
    }

    .example-select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }

    .example-select:focus {
      border-color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      padding: 7px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-primary {
      background: var(--gradient);
      border: none;
      color: #fff;
    }

    .btn-primary:hover {
      opacity: 0.9;
      color: #fff;
    }

    .btn svg {
      width: 14px;
      height: 14px;
    }

    /* ─── Main Area ──────────────────────────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Editor Panel ───────────────────────────────────────────────── */
    .editor-panel {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-width: 300px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--text-dim);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .editor-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #editor {
      width: 100%;
      height: 100%;
      background: var(--bg-editor);
      color: #d4d4d8;
      border: none;
      outline: none;
      resize: none;
      padding: 20px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 14px;
      line-height: 1.7;
      tab-size: 4;
      -moz-tab-size: 4;
      overflow: auto;
    }

    #editor::selection {
      background: rgba(0, 212, 255, 0.2);
    }

    /* ─── Preview Panel ──────────────────────────────────────────────── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 300px;
    }

    .preview-wrap {
      flex: 1;
      background: #fff;
      position: relative;
    }

    #preview {
      width: 100%;
      height: 100%;
      border: none;
    }

    .error-bar {
      display: none;
      padding: 8px 16px;
      background: #2d1117;
      color: #f85149;
      font-size: 0.82rem;
      font-family: 'JetBrains Mono', monospace;
      border-top: 1px solid rgba(248, 81, 73, 0.2);
    }

    .error-bar.visible {
      display: block;
    }

    /* ─── Resize Handle ──────────────────────────────────────────────── */
    .resize-handle {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .resize-handle:hover,
    .resize-handle.active {
      background: var(--accent);
    }

    /* ─── Status Bar ─────────────────────────────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 16px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
      margin-right: 6px;
    }

    /* ─── Toast ──────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .main {
        flex-direction: column;
      }
      .editor-panel {
        width: 100%;
        height: 50%;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .preview-panel {
        height: 50%;
      }
      .resize-handle { display: none; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">NC UI <span>Playground</span></div>
      <select class="example-select" id="exampleSelect">
        <option value="portfolio">Portfolio</option>
        <option value="landing">Landing Page</option>
        <option value="dashboard">Dashboard</option>
      </select>
    </div>
    <div class="header-right">
      <button class="btn" id="btnCopy" title="Copy compiled HTML">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy HTML
      </button>
      <button class="btn" id="btnDownload" title="Download as .html file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="editor-panel" id="editorPanel">
      <div class="panel-header">
        <span>Editor</span>
        <span id="lineCount">0 lines</span>
      </div>
      <div class="editor-wrap">
        <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </div>
    </div>

    <div class="resize-handle" id="resizeHandle"></div>

    <div class="preview-panel">
      <div class="panel-header">
        <span>Preview</span>
        <span id="compileTime"></span>
      </div>
      <div class="preview-wrap">
        <iframe id="preview" sandbox="allow-scripts"></iframe>
      </div>
      <div class="error-bar" id="errorBar"></div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div><span class="status-dot"></span>NC UI Compiler v1.0.0 — Client-side</div>
    <div>Tab = 4 spaces | Auto-compile: 300ms</div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Compiler (inline) -->
  <script src="compiler.js"></script>
  <script src="nc-ui.js"></script>

  <script>
    // ─── Examples ──────────────────────────────────────────────────────

    const EXAMPLES = {
      portfolio: `page "John Doe — Portfolio"
theme "dark"
accent "#00d4ff"

nav:
    brand "JD"
    links:

section hero centered:

    animate "fade-up"

section work centered:
    heading "What I Do"

    grid 3 columns:
        card icon "code":
            heading "Development"
            text "NC UI, static HTML, and portable JavaScript — shipping polished interfaces without framework lock-in."
        card icon "design":
            heading "Design"

        card icon "rocket":
            heading "Performance"
            text "Blazing fast load times and smooth interactions on every device."
    animate "stagger"

section contact centered:
    heading "Get in Touch"
    text "Have a project in mind? Let's talk."
    form action "/api/contact":
        input "Name" required
        input "Email" type "email" required
        textarea "Your Message"
        button "Send Message" style "primary"
    animate "fade-up"

footer:
    text "Built with NC UI by John Doe"
    row:
        link "GitHub" to "https://github.com"
        link "Twitter" to "https://twitter.com"
        link "LinkedIn" to "https://linkedin.com"`,

      landing: `page "Nexus — Ship Faster"

accent "#8b5cf6"

section hero centered:

    heading "Ship products 10x faster" style "gradient"

section features centered:

    row:
        link "Docs" to "#"

        link "Twitter" to "https://twitter.com"`,

      dashboard: `page "Dashboard — Analytics"
theme "dark"
accent "#10b981"

    brand "Analytics"

                item "Sarah pushed 12 commits today"

    heading "Monthly Highlights"
    grid 3 columns:
        card icon "rocket":

            text "Zero critical incidents"
        card icon "heart":
            heading "NPS Score"
            stat "72" "Industry avg: 44"
            text "Customer satisfaction rising"
    animate "stagger"

    text "Analytics Dashboard v2.4 — Built with NC UI"
    row:
        link "Documentation" to "#"
        link "Support" to "#"
        link "Status" to "#"`
    };

    // ─── DOM ────────────────────────────────────────────────────────────

    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const errorBar = document.getElementById('errorBar');
    const lineCount = document.getElementById('lineCount');
    const compileTime = document.getElementById('compileTime');
    const exampleSelect = document.getElementById('exampleSelect');
    const toast = document.getElementById('toast');

    // ─── Compile ────────────────────────────────────────────────────────

    let compileTimer = null;
    let lastCompiledHtml = '';

    function compileAndRender() {
      const source = editor.value;
      const lines = source.split('\n').length;
      lineCount.textContent = lines + ' line' + (lines === 1 ? '' : 's');

      try {
        const start = performance.now();
        const html = NCUI.compile(source);
        const elapsed = (performance.now() - start).toFixed(1);
        compileTime.textContent = elapsed + 'ms';

        lastCompiledHtml = html;

        const doc = preview.contentDocument || preview.contentWindow.document;
        doc.open();
        doc.write(html);
        doc.close();

        errorBar.classList.remove('visible');
        errorBar.textContent = '';
      } catch (e) {
        errorBar.textContent = 'Error: ' + e.message;
        errorBar.classList.add('visible');
      }
    }

    function scheduleCompile() {
      clearTimeout(compileTimer);
      compileTimer = setTimeout(compileAndRender, 300);
    }

    editor.addEventListener('input', scheduleCompile);

    // ─── Tab support ────────────────────────────────────────────────────

    editor.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = this.selectionStart;
        const end = this.selectionEnd;
        this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
        this.selectionStart = this.selectionEnd = start + 4;
        scheduleCompile();
      }
    });

    // ─── Example Switching ──────────────────────────────────────────────

    exampleSelect.addEventListener('change', function() {
      const key = this.value;
      if (EXAMPLES[key]) {
        editor.value = EXAMPLES[key];
        compileAndRender();
      }
    });

    // ─── Copy HTML ──────────────────────────────────────────────────────

    document.getElementById('btnCopy').addEventListener('click', function() {
      if (!lastCompiledHtml) return;
      navigator.clipboard.writeText(lastCompiledHtml).then(function() {
        showToast('HTML copied to clipboard');
      }).catch(function() {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = lastCompiledHtml;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('HTML copied to clipboard');
      });
    });

    // ─── Download HTML ──────────────────────────────────────────────────

    document.getElementById('btnDownload').addEventListener('click', function() {
      if (!lastCompiledHtml) return;
      const blob = new Blob([lastCompiledHtml], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (exampleSelect.value || 'ncui-output') + '.html';
      a.click();
      URL.revokeObjectURL(url);
      showToast('File downloaded');
    });

    // ─── Toast ──────────────────────────────────────────────────────────

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2000);
    }

    // ─── Resize Handle ──────────────────────────────────────────────────

    (function() {
      const handle = document.getElementById('resizeHandle');
      const editorPanel = document.getElementById('editorPanel');
      let isResizing = false;

      handle.addEventListener('mousedown', function(e) {
        isResizing = true;
        handle.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', function(e) {
        if (!isResizing) return;
        const containerWidth = document.querySelector('.main').offsetWidth;
        const newWidth = Math.max(250, Math.min(e.clientX, containerWidth - 250));
        editorPanel.style.width = newWidth + 'px';
      });

      document.addEventListener('mouseup', function() {
        if (isResizing) {
          isResizing = false;
          handle.classList.remove('active');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        }
      });
    })();

    // ─── Init ───────────────────────────────────────────────────────────

    editor.value = EXAMPLES.portfolio;
    compileAndRender();
  </script>
</body>
</html>
