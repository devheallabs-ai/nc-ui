<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | NC UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --bg-card: #12121a;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f5;
      --text-dim: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.35);
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --gradient: linear-gradient(135deg, #00d4ff, #7c3aed);
      --gradient-wide: linear-gradient(135deg, #00d4ff 0%, #7c3aed 50%, #ff6bcb 100%);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* Background glow */
    body::before {
      content: '';
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: 10%;
      right: 20%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 560px;
    }

    .error-code {
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 900;
      line-height: 1;
      background: var(--gradient-wide);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: gradientShift 5s ease infinite;
      margin-bottom: 16px;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    p {
      color: var(--text-dim);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .terminal-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 40px;
      text-align: left;
    }
    .terminal-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
    }
    .terminal-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .dot-red { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green { background: #28c840; }
    .terminal-body {
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      line-height: 2;
    }
    .prompt { color: var(--accent); }
    .cmd { color: var(--text); }
    .error { color: #f85149; }
    .comment { color: var(--text-muted); }

    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      border: none;
    }
    .btn-primary {
      background: var(--gradient);
      color: #fff;
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.2);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 212, 255, 0.3);
    }
    .btn-ghost {
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }

    .footer-note {
      position: absolute;
      bottom: 32px;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .footer-note a {
      color: var(--accent);
      text-decoration: none;
    }
    .footer-note a:hover { opacity: 0.8; }

    /* Floating particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: float linear infinite;
      opacity: 0;
    }
    @keyframes float {
      0% { opacity: 0; transform: translateY(0) scale(0); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-100vh) scale(1); }
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="error-code">404</div>
    <h1>Page not found</h1>
    <p>The page you are looking for does not exist or has been moved. Maybe the NC UI compiler can help you build it.</p>

    <div class="terminal-box">
      <div class="terminal-header">
        <span class="terminal-dot dot-red"></span>
        <span class="terminal-dot dot-yellow"></span>
        <span class="terminal-dot dot-green"></span>
      </div>
      <div class="terminal-body">
        <span class="prompt">$</span> <span class="cmd">nc-ui find this-page</span><br>
        <span class="error">Error: page not found in any .ncui file</span><br>
        <span class="comment"># Try navigating home instead</span><br>
        <span class="prompt">$</span> <span class="cmd">nc-ui build home.ncui</span>
      </div>
    </div>

    <div class="actions">
      <a href="index.html" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Go Home
      </a>
      <a href="playground.html" class="btn btn-ghost">
        Try Playground
      </a>
    </div>
  </div>

  <div class="footer-note">
    NC UI by <a href="https://devheallabs.in" target="_blank" rel="noopener">DevHeal Labs AI</a>
  </div>

  <script>
    // Floating particles
    (function() {
      var colors = ['0, 212, 255', '124, 58, 237', '255, 107, 203'];
      for (var i = 0; i < 12; i++) {
        var p = document.createElement('div');
        p.className = 'particle';
        var size = Math.random() * 4 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.bottom = '-10px';
        p.style.background = 'rgba(' + colors[Math.floor(Math.random() * colors.length)] + ', 0.4)';
        p.style.animationDuration = (Math.random() * 10 + 8) + 's';
        p.style.animationDelay = (Math.random() * 10) + 's';
        document.body.appendChild(p);
      }
    })();
  </script>
</body>
</html>
